name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM || 'linux/amd64' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build project
        run: npm run build

  docker-validation:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          platforms: ${{ env.DOCKER_PLATFORM }}
          tags: tsinger:ci

      - name: Start container
        run: docker run -d --rm --platform ${{ env.DOCKER_PLATFORM }} --name tsinger-ci -p 8080:8080 tsinger:ci

      - name: Verify health endpoint
        run: |
          for attempt in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:8080/healthz | grep -q 'ok'; then
              echo "Health check passed on attempt $attempt"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed health check after 20 attempts"
          docker logs tsinger-ci
          exit 1

      - name: Verify root document
        run: curl -fsS http://127.0.0.1:8080/ | grep -qi '<!doctype html'

      - name: Verify SPA deep-link routing
        run: |
          STATUS=$(curl -o /dev/null -s -w '%{http_code}' http://127.0.0.1:8080/some/fake/path)
          if [ "$STATUS" != "200" ]; then
            echo "SPA routing failed: GET /some/fake/path returned $STATUS (expected 200)"
            exit 1
          fi
          curl -fsS http://127.0.0.1:8080/some/fake/path | grep -qi '<!doctype html'
          echo "SPA deep-link routing verified"

      - name: Stop container
        if: always()
        run: docker stop tsinger-ci || true

  cdk-synth:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect CDK changes
        id: cdk-changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "$base_sha" || "$base_sha" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$base_sha" "$head_sha" -- cdk; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.cdk-changes.outputs.changed == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        if: steps.cdk-changes.outputs.changed == 'true'
        working-directory: cdk
        run: npm ci

      - name: Synthesize CDK
        if: steps.cdk-changes.outputs.changed == 'true'
        working-directory: cdk
        run: |
          npx cdk synth \
            -c imageTag=ci-synth \
            -c enableBasicAuth=false \
            --parameters OriginSecret=0123456789abcdef0123456789abcdef

      - name: Skip synth when CDK is unchanged
        if: steps.cdk-changes.outputs.changed != 'true'
        run: echo "No changes under cdk/. Skipping synth."
