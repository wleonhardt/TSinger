name: Docker Publish

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

env:
  DOCKER_PLATFORM: ${{ vars.DOCKER_PLATFORM || 'linux/amd64' }}
  DOCKERHUB_IMAGE: ${{ vars.DOCKERHUB_IMAGE || 'wleonhardt/tsinger' }}

jobs:
  publish:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image_main: ${{ steps.vars.outputs.image_main }}
      image_sha: ${{ steps.vars.outputs.image_sha }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Compute image tags
        id: vars
        run: |
          COMMIT_SHA="${SOURCE_SHA}"
          SHORT_SHA="${COMMIT_SHA::8}"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${DOCKERHUB_IMAGE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_main=${DOCKERHUB_IMAGE}:main" >> "$GITHUB_OUTPUT"
        env:
          SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: ${{ env.DOCKER_PLATFORM }}
          tags: |
            ${{ steps.vars.outputs.image_sha }}
            ${{ steps.vars.outputs.image_main }}

      - name: Job summary
        run: |
          {
            echo "### Docker images published"
            echo "| Tag | Image |"
            echo "|-----|-------|"
            echo "| SHA | \`${IMAGE_SHA}\` |"
            echo "| main | \`${IMAGE_MAIN}\` |"
            echo ""
            echo "Commit: \`${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          IMAGE_SHA: ${{ steps.vars.outputs.image_sha }}
          IMAGE_MAIN: ${{ steps.vars.outputs.image_main }}
          SHORT_SHA: ${{ steps.vars.outputs.short_sha }}
